<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <title>Qr code challenge</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background:hsl(212, 45%, 89%);
        }
        .qr-code-container {
            width: 320px;
            background: hsl(0, 0%, 100%);
            padding: 16px;
            border-radius: 15px;
            text-align: center;
            margin: auto;
        }
        .qr-image {
            width: 100%;
            border-radius: 8px;
        }
        .description {
            padding: 20px 15px 20px 15px;
        }
        .description h1 {
            font-size: 22px;
            color: hsl(218, 44%, 22%);
            margin-bottom: 20px;
        }
        .description p {
            font-size: 15px;
            color: hsl(220, 15%, 55%);
        }
        .attribution {
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translate(-50%, -20px);
            text-align: center;
            font-size: 16px;
        }
        .attribution a {
            font-weight: 700;
            color: #2C7DFA;
        }
        .attribution a:active {
            color: #1f4a8a;
        }
        @media (max-width: 350px) {
            .attribution {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="qr-code-container">
            <img class="qr-image" src="./images/image-qr-code.png" alt="qr-code image">
            <div class="description">
                <!-- Page should container a h1 -->
                <h1>Improve your front-end skills by building projects</h1>
                <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
            </div>
        </section>
        <div class="attribution">
            Challenge by <a href="https://www.frontendmentor.io/profile/manuelscl" target="_blank">Frontend Mentor</a>. 
            Coded by <a href="https://github.com/manuelscl/qr-code" target="_blank">Manuel</a>.
        </div>
    </main>
</body>
</html>
